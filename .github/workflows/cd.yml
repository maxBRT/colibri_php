name: CD

on:
  push:
    branches: [main]

jobs:
  build_and_deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push with Compose
        run: |
          docker compose build
          docker compose push

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.REMOTE_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts

      - name: Create Docker Context
        run: |
          docker context create colibri \
            --docker "host=ssh://max@${{ secrets.REMOTE_HOST }}"

      - name: Deploy Stack
        run: |
          docker --context colibri stack deploy \
            -c docker-compose.yml colibri
