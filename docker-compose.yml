version: "3.8"

# Production Docker Compose for Dokploy-managed deployment
# Images are built in CI/CD pipeline and pulled from DockerHub
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: maximebourret/colibri-api:latest
    env_file:
      - .env
    networks:
      - dokploy-network
    
    volumes:
      - sqlite_data:/app/database
      - storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 60s
      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: pause
        monitor: 60s

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: maximebourret/colibri-api:latest
    command: php artisan schedule:work
    env_file:
      - .env
    volumes:
      - sqlite_data:/app/database
      - storage:/app/storage
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'schedule:work' || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: stop-first

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: maximebourret/colibri-api:latest
    command: php artisan queue:work --queue=rss,cleanup,enrichment,logos --sleep=3 --tries=3
    env_file:
      - .env
    volumes:
      - sqlite_data:/app/database
      - storage:/app/storage
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: stop-first

  migrator:
    build:
      context: .
      dockerfile: Dockerfile
    image: maximebourret/colibri-api:latest
    command: >
      sh -c "php artisan migrate --force &&
             php artisan db:seed --force"
    volumes:
      - sqlite_data:/app/database
    networks:
      - dokploy-network

  docs:
    image: maximebourret/colibri-docs:latest
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.docs.rule=Host(`colibri-rss.com`)"
      - "traefik.http.routers.docs.entrypoints=websecure"
      - "traefik.http.routers.docs.tls.certresolver=letsencrypt"
      - "traefik.http.services.docs.loadbalancer.server.port=3000"
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s

networks:
  dokploy-network:
    external: true
    name: dokploy-network

volumes:
  sqlite_data:
    driver: local
  storage:
    driver: local
