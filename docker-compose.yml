version: "3.8"

# Production Docker Compose for Dockploy-managed deployment
# This file is designed to work with a self-hosted Dockploy server
services:
  app:
    image: maximebourret/colibri-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - sqlite_data:/app/database
      - storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 60s
      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: pause
        monitor: 60s

  scheduler:
    image: maximebourret/colibri-api:latest
    command: scheduler
    env_file:
      - .env
    volumes:
      - sqlite_data:/app/database
      - storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'schedule:work' || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: stop-first

  worker:
    image: maximebourret/colibri-api:latest
    command: worker
    env_file:
      - .env
    volumes:
      - sqlite_data:/app/database
      - storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: stop-first

  docs:
    image: maximebourret/colibri-docs:latest
    build: ./docs
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s

volumes:
  sqlite_data:
    driver: local
  storage:
    driver: local
