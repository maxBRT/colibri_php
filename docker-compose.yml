version: "3.8"

# Production Docker Compose for Dockploy-managed deployment
# This file is designed to work with a self-hosted Dockploy server
services:
  app:
    image: maximebourret/colibri-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # Catch traffic for the specific subdomain
      - "traefik.http.routers.colibri-api.rule=Host(`api.colibri-rss.com`)"
      # Force the connection over HTTPS (port 443)
      - "traefik.http.routers.colibri-api.entrypoints=websecure"
      # Request the Let's Encrypt certificate automatically
      - "traefik.http.routers.colibri-api.tls.certresolver=letsencrypt"
      # Tell Traefik which internal port your app listens on
      - "traefik.http.services.colibri-api.loadbalancer.server.port=80"
    volumes:
      - sqlite_data:/app/database
      - storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 60s
      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: pause
        monitor: 60s

  scheduler:
    image: maximebourret/colibri-api:latest
    command: php artisan schedule:work
    env_file:
      - .env
    volumes:
      - sqlite_data:/app/database
      - storage:/app/storage
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'schedule:work' || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: stop-first

  worker:
    image: maximebourret/colibri-api:latest
    command: php artisan queue:work --queue=rss,cleanup,enrichment,logos --sleep=3 --tries=3
    env_file:
      - .env
    volumes:
      - sqlite_data:/app/database
      - storage:/app/storage
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: stop-first

  docs:
    image: maximebourret/colibri-docs:latest
    build: ./docs
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # Catch traffic for the specific subdomain
      - "traefik.http.routers.colibri-api.rule=Host(`colibri-rss.com`)"
      # Force the connection over HTTPS (port 443)
      - "traefik.http.routers.colibri-api.entrypoints=websecure"
      # Request the Let's Encrypt certificate automatically
      - "traefik.http.routers.colibri-api.tls.certresolver=letsencrypt"
      # Tell Traefik which internal port your app listens on
      - "traefik.http.services.colibri-api.loadbalancer.server.port=3000"

    deploy:
      replicas: 1
      restart_policy:
        condition: any
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
networks:
  dokploy-network:
    external: true

volumes:
  sqlite_data:
    driver: local
  storage:
    driver: local
